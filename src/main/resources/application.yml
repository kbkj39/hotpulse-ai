socketio:
  port: ${SOCKETIO_PORT:9001}

server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: hotpulse

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotpulse}
    username: ${SPRING_DATASOURCE_USERNAME:hotpulse}
    password: ${SPRING_DATASOURCE_PASSWORD:hotpulse123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:hotpulse}
    password: ${RABBITMQ_PASSWORD:hotpulse123}

  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY:}
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}
      chat:
        options:
          model: deepseek/deepseek-chat
          temperature: 0.3
          max-tokens: 4096
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-large}

  threads:
    virtual:
      enabled: true

  mvc:
    async:
      request-timeout: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

agent:
  searcher:
    max-parallel: ${AGENT_SEARCHER_MAX_PARALLEL:5}
  crawler:
    max-parallel: ${AGENT_CRAWLER_MAX_PARALLEL:10}
  token-budget-per-execution: ${AGENT_TOKEN_BUDGET_PER_EXECUTION:50000}

iwencai:
  base-url: ${IWENCAI_BASE_URL:https://openapi.iwencai.com}
  api-key: ${IWENCAI_API_KEY:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
  level:
    com.hotpulse: INFO
    org.springframework.ai: INFO
